name: Deploy web to GitHub Pages

# Builds the Expo web export and publishes it to GitHub Pages.
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export web build
        # EXPO_PUBLIC_* vars are inlined into the client bundle at export time.
        # Supplying the BALLDONTLIE key switches the app from the keyless
        # openfootball fallback to the real-time FIFA feed (live scores/clock).
        # Add the key under repo Settings → Secrets and variables → Actions.
        env:
          EXPO_PUBLIC_BALLDONTLIE_KEY: ${{ secrets.EXPO_PUBLIC_BALLDONTLIE_KEY }}
        run: npx expo export --platform web

      - name: SPA fallback + disable Jekyll
        # GitHub Pages 404s unknown paths; serving index.html as 404.html lets
        # client-side routing handle deep links / hard refreshes. .nojekyll keeps
        # Pages from ignoring the _expo/ folder (underscore-prefixed).
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
